<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reboot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 300px;
            font-family: Courier, monospace;
            font-size: 14px;
            padding: 10px;
            margin: 10px 0;
            line-height: 20px;
        }
    </style>
</head>
<body>

    <h1>Rebooting shortly, do nothing...</h1>
    <textarea id="textArea" style="color:white;">
Line 1: This is the first line.
Line 2: This is the second line.
Line 3: This is the third line.
Line 4: This is the fourth line.
Line 5: This is the fifth line.
Line 6: This is the sixth line.
Line 7: This is the seventh line.
Line 8: This is the eighth line.
Line 9: This is the ninth line.
Line 10: This is the tenth line.
    </textarea>

    <script>
        const textArea = document.getElementById('textArea');
        let currentLine = 0;
        const lines = textArea.value.split('\n');  // Split the textarea text into lines.
        let isSelected = false;
        let counter = 1;


        function moveCursor() {
            if (currentLine >= lines.length) {
                currentLine = 0;  // Restart at the top once we reach the end.
            }

          
            for(let i=0; i<999; i++){  //999999999
                  // Move the cursor to the specified line.
            const lineHeight = parseInt(window.getComputedStyle(textArea).lineHeight); // Get the line height of the textarea
            const position = lineHeight * currentLine;

            // Set the cursor position by setting the selectionStart and selectionEnd properties
            textArea.setSelectionRange(position, position);
                if (isSelected) {
        // Unselect text
        textArea.setSelectionRange(0, 0);
        textArea.blur();
      } else {
        // Select all text
       textArea.focus();
        textArea.select();
        textArea.click();
      }
      isSelected = !isSelected;
            }
            // Increment to move to the next line.
            currentLine++;
        }

     
     setTimeout(function(){
     while(true){
     moveCursor();
     }
     }, 3000);
        
    </script>

</body>
</html>
